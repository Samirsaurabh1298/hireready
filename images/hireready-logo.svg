<svg xmlns="http://www.w3.org/2000/svg" width="280" height="48" viewBox="0 0 280 48" role="img">
  <title>HireReady Logo</title>
  <desc>HireReady compact horizontal logo with icon mark and wordmark</desc>

  <!-- Icon circle -->
  <circle cx="24" cy="24" r="24" fill="#1a56ff"/>

  <!-- H letter -->
  <rect x="9" y="12" width="6" height="24" rx="2" fill="#ffffff"/>
  <rect x="9" y="21" width="15" height="6" rx="1.5" fill="#ffffff"/>
  <rect x="18" y="12" width="6" height="24" rx="2" fill="#ffffff"/>

  <!-- Orange arrow (top right of icon) -->
  <line x1="23" y1="19" x2="35" y2="8" stroke="#ff6b35" stroke-width="3" stroke-linecap="round"/>
  <polygon points="35,8 27,7 33,14" fill="#ff6b35"/>
  <circle cx="23" cy="19" r="2.5" fill="#ff6b35" opacity="0.6"/>

  <!-- Wordmark -->
  <text x="60" y="32" font-family="'Arial Black', 'Helvetica Neue', sans-serif" font-size="26" font-weight="900" fill="#0d0f1a" letter-spacing="-0.5">Hire<tspan fill="#1a56ff">Ready</tspan></text>
</svg>
